openapi: '3.0.0'
info:
  version: 1.0.0
  title: Swagger Petstore
  description: Petstore with examples
servers:
  - url: http://petstore.swagger.io/v1
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      x-eventcatalog-message-type: query
      responses:
        '200':
          description: A paged array of pets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pets'
              example:
                - id: 1
                  name: 'Fido'
                  tag: 'dog'
                - id: 2
                  name: 'Whiskers'
                  tag: 'cat'
    post:
      summary: Create a pet
      operationId: createPets
      x-eventcatalog-message-type: command
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
            examples:
              dog:
                summary: A dog example
                value:
                  id: 1
                  name: 'Fido'
                  tag: 'dog'
              cat:
                summary: A cat example
                value:
                  id: 2
                  name: 'Whiskers'
                  tag: 'cat'
        required: true
      responses:
        '201':
          description: Null response
  /pets/{petId}/adopted:
    post:
      summary: Notify that a pet has been adopted
      operationId: petAdopted
      x-eventcatalog-message-type: event
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Adoption'
            example:
              petId: 1
              adopterName: 'John Doe'
        required: true
      responses:
        '200':
          description: Adoption confirmed
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    Pets:
      type: array
      maxItems: 100
      items:
        $ref: '#/components/schemas/Pet'
    Adoption:
      type: object
      required:
        - petId
        - adopterName
      properties:
        petId:
          type: integer
          format: int64
        adopterName:
          type: string
