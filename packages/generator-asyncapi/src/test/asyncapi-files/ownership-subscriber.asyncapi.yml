asyncapi: 3.0.0
info:
  title: Notification Service
  version: 1.0.0
  description: Subscribes to OrderPlaced
channels:
  orders:
    address: orders
    messages:
      OrderPlaced:
        $ref: '#/components/messages/OrderPlaced'
operations:
  receiveOrderPlaced:
    action: receive
    channel:
      $ref: '#/channels/orders'
    messages:
      - $ref: '#/channels/orders/messages/OrderPlaced'
components:
  messages:
    OrderPlaced:
      summary: Subscriber's view of the message
      payload:
        type: object
        properties:
          orderId:
            type: string
